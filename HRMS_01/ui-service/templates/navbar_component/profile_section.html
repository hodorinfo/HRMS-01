{% load i18n %}
{% load static %}
<div class="oh-dropdown" x-data="{open: false}">
    <div class="oh-navbar__user-info" @click="open = !open" style="cursor: pointer; display: flex; align-items: center;">
        <div class="oh-navbar__user-photo" style="width: 32px; height: 32px; border-radius: 50%; overflow: hidden; margin-right: 8px;">
            <img src="{% if current_user.employee_avatar %}{{ current_user.employee_avatar }}{% else %}{% static 'images/ui/default_avatar.jpg' %}{% endif %}" class="oh-navbar__user-image" loading="lazy" style="width: 100%; height: 100%; object-fit: cover;" />
        </div>
        <span class="oh-navbar__user-name" style="font-weight: 500; font-size: 14px; color: #333;">{{ current_user.username|default:"Lizaveta Ivanovna" }}</span>
    </div>
    <div class="oh-dropdown__menu oh-dropdown__menu--right" x-show="open" @click.outside="open = false" style="display: none; position: absolute; right: 0; background: #fff; border: 1px solid #e0e0e0; border-radius: 4px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); z-index: 1000; min-width: 180px; margin-top: 5px;">
        <ul class="oh-dropdown__items" style="list-style: none; margin: 0; padding: 5px 0;">
            <li class="oh-dropdown__item" style="padding: 5px 15px;">
                <a href="/employees/" class="oh-dropdown__link" style="text-decoration: none; color: #333; font-size: 14px; display: block;">{% trans "My Profile" %}</a>
            </li>
            <li class="oh-dropdown__item" style="padding: 5px 15px;">
                <a href="/settings/" class="oh-dropdown__link" style="text-decoration: none; color: #333; font-size: 14px; display: block;">{% trans "Settings" %}</a>
            </li>
        </ul>
        <hr style="margin: 5px 0; border: none; border-top: 1px solid #eee;" />
        <ul class="oh-dropdown__items" style="list-style: none; margin: 0; padding: 5px 0;">
            <li class="oh-dropdown__item" style="padding: 5px 15px;">
                <a href="/logout/" class="oh-dropdown__link" style="text-decoration: none; color: #ff5722; font-weight: 500; font-size: 14px; display: block;">{% trans "Log out" %}</a>
            </li>
        </ul>
    </div>
</div>
