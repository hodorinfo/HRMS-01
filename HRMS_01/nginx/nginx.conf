events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;
    
    sendfile        on;
    keepalive_timeout  65;

    # Backend API Gateway Configuration
    server {
        listen 80 default_server;
        server_name _;


        # Handle Preflight OPTIONS requests globally
        location = /api/v1/options_preflight {
            internal;
            add_header 'Access-Control-Allow-Origin' '*' always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, PATCH, DELETE, OPTIONS' always;
            add_header 'Access-Control-Allow-Headers' 'Authorization, Content-Type, Accept, Origin, User-Agent, X-Requested-With' always;
            add_header 'Access-Control-Max-Age' 1728000;
            add_header 'Content-Type' 'text/plain charset=UTF-8';
            add_header 'Content-Length' 0;
            return 204;
        }

        # 1. Identity Service
        location ~ ^/api/v1/(auth|employees|accessibility|ldap|outlook|notes|tags|disciplinary|rewards|policies|general-settings|health) {
            if ($request_method = 'OPTIONS') {
                rewrite ^ /api/v1/options_preflight last;
            }
            proxy_pass http://identity-service:8000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # 2. Permission Service
        location /api/v1/permissions {
            if ($request_method = 'OPTIONS') {
                rewrite ^ /api/v1/options_preflight last;
            }
            proxy_pass http://permission-service:8000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location /api/v1/roles {
            if ($request_method = 'OPTIONS') {
                rewrite ^ /api/v1/options_preflight last;
            }
            proxy_pass http://permission-service:8000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # 3. Attendance Service
        location ~ ^/api/v1/(attendance|attendance-activities|batch-attendance|attendance-overtime|attendance-late-early|grace-time|attendance-settings|work-records|leave-types|leave-requests|available-leave|leave-allocations|restrict-leave|compensatory-leave|biometric-devices|biometric-employees|face-detection|employee-face-detection|geofencing|clock-in|clock-out|attendance-validate|attendance-request-approve|attendance-request-cancel|overtime-approve|approve|reject(?:$|/)|cancel|allocation-approve|allocation-reject|request-bulk-action|offline-employees) {
            if ($request_method = 'OPTIONS') {
                rewrite ^ /api/v1/options_preflight last;
            }
            proxy_pass http://attendance-service:8000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # 4. Core Service
        location ~ ^/api/v1/(companies|departments|job-positions|job-roles|work-types|employee-types|shifts|shift-days|shift-schedules|rotating-work-types|rotating-work-type-assigns|rotating-shifts|rotating-shift-assigns|company-leaves|holidays|work-type-requests|shift-requests|approval-conditions|approval-managers|announcements|announcement-comments|announcement-views|mail-templates) {
            if ($request_method = 'OPTIONS') {
                rewrite ^ /api/v1/options_preflight last;
            }
            proxy_pass http://core-service:8000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # 5. Talent Service
        location ~ ^/api/v1/(hiring-requests|position-preps|icps|interview-questions|job-descriptions|sourcing-channels|pipeline-stages|rejection-reasons|candidates|candidate-screenings|interview-feedbacks|hiring-error-flags|offer-details|hiring-master-templates|master-process-steps|step-dependencies|request-step-trackers|onboarding-stages|onboarding-tasks|candidate-stages|candidate-tasks|onboarding-portals|offboarding|offboarding-stages|offboarding-employees|offboarding-tasks|employee-tasks|resignation-letters|exit-reasons|offboarding-notes|offboarding-settings|offboarding-files) {
            if ($request_method = 'OPTIONS') {
                rewrite ^ /api/v1/options_preflight last;
            }
            proxy_pass http://talent-service:8000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # 6. Payroll Service
        location ~ ^/api/v1/(contracts|allowances|deductions|payslips|loans|filing-status|reimbursements|payslip-download|payslip-send-mail|reimbursement-approve-reject|reimbusement-approve-reject) {
            if ($request_method = 'OPTIONS') {
                rewrite ^ /api/v1/options_preflight last;
            }
            proxy_pass http://payroll-service:8000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # 7. Platform Service
        location ~ ^/api/v1/(automations|notifications|document-requests|documents) {
            if ($request_method = 'OPTIONS') {
                rewrite ^ /api/v1/options_preflight last;
            }
            proxy_pass http://platform-service:8000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # Global Fallback for unmatched API routes
        location /api/v1/ {
            if ($request_method = 'OPTIONS') {
                rewrite ^ /api/v1/options_preflight last;
            }
            # You can default to a specific service or return 404
            return 404 "{\"detail\":\"API Route Not Found in API Gateway\"}";
        }

        # Swagger Docs Routing
        location /api/docs {
            proxy_pass http://identity-service:8000/api/docs;
            proxy_set_header Host $host;
        }

        location /api/openapi.json {
            proxy_pass http://identity-service:8000/api/openapi.json;
            proxy_set_header Host $host;
        }
    }
}
