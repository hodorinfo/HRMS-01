events {
    worker_connections 1024;
}

# Nginx API Gateway - Routes requests to correct microservice
# All requests come to port 80, Nginx routes them

http {
    upstream ui_service         { server ui-service:8000; }
    upstream core_service       { server core-service:8000; }
    upstream identity_service   { server identity-service:8000; }
    upstream attendance_service { server attendance-service:8000; }
    upstream payroll_service    { server payroll-service:8000; }
    upstream permission_service { server permission-service:8000; }
    upstream talent_service     { server talent-service:8000; }
    upstream platform_service   { server platform-service:8000; }

    server {
        listen 80;

        # UI (Django BFF) - serves HTML pages
        location / {
            proxy_pass http://ui_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Core Service API
        location /api/core/ {
            proxy_pass http://core_service/api/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # Identity Service API (Login, Employee)
        location /api/identity/ {
            proxy_pass http://identity_service/api/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # Attendance Service API
        location /api/attendance/ {
            proxy_pass http://attendance_service/api/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # Payroll Service API
        location /api/payroll/ {
            proxy_pass http://payroll_service/api/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # Talent Service API
        location /api/talent/ {
            proxy_pass http://talent_service/api/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # Permission Service API
        location /api/permissions/ {
            proxy_pass http://permission_service/api/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # Platform Service API
        location /api/platform/ {
            proxy_pass http://platform_service/api/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # Static & Media files
        location /static/ {
            proxy_pass http://ui_service/static/;
        }

        location /media/ {
            proxy_pass http://ui_service/media/;
        }
    }
}
