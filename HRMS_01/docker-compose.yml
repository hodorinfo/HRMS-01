      PERMISSION_SERVICE_URL: ${PERMISSION_SERVICE_URL}
    ports:
      - "8007:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - horilla-network

  platform-worker:
    build:
      context: .
      dockerfile: platform-service/Dockerfile
    command: celery -A app.celery_worker.celery_app worker --loglevel=info
    environment:
      DATABASE_URL: ${PLATFORM_DATABASE_URL}
      CELERY_BROKER_URL: ${CELERY_BROKER_URL}
      CELERY_RESULT_BACKEND: ${CELERY_RESULT_BACKEND}
    depends_on:
      - redis
      - platform-service
    networks:
      - horilla-network

volumes:
  postgres_data:

networks:
  horilla-network:
    driver: bridge
