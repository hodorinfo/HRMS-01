      dockerfile: permission-service/Dockerfile
    environment:
      DATABASE_URL: ${PERMISSION_DATABASE_URL}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
    ports:
      - "8005:8000"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - horilla-network

  talent-service:
    build:
      context: .
      dockerfile: talent-service/Dockerfile
    environment:
      DATABASE_URL: ${TALENT_DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      CELERY_BROKER_URL: ${CELERY_BROKER_URL}
      CELERY_RESULT_BACKEND: ${CELERY_RESULT_BACKEND}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      PERMISSION_SERVICE_URL: ${PERMISSION_SERVICE_URL}
    ports:
      - "8006:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - horilla-network

  talent-worker:
    build:
      context: .
      dockerfile: talent-service/Dockerfile
    command: celery -A app.celery_worker.celery_app worker --loglevel=info
    environment:
      DATABASE_URL: ${TALENT_DATABASE_URL}
      CELERY_BROKER_URL: ${CELERY_BROKER_URL}
      CELERY_RESULT_BACKEND: ${CELERY_RESULT_BACKEND}
